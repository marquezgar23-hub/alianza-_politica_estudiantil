<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta Estudiantil - APE</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <header class="site-header">
        <nav class="site-nav">
            <button onclick="window.location.href='index.html'" class="btn-ape">Inicio</button>
            <button onclick="window.location.href='noticias.html'" class="btn-ape">Noticias</button>
        </nav>
            <img src="images/ape_logo_transparente.png" alt="Logo APE" class="site-logo">
        </a>
    </header>
    
    

    <main class="blog-container">
        <section class="post">
            <h1 class="post-title">Contacto y Sugerencias</h1>
            <p class="post-intro">Utiliza este formulario para hacernos llegar tus comentarios o dudas.</p>

            <form id="google-sheet-form" class="survey-form">
                <div class="form-group">
                    <label for="nombre">Nombre Completo *</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label for="correo">Correo Institucional *</label>
                    <input type="email" id="correo" name="correo" placeholder="ejemplo@uabc.edu.mx" required>
                </div>
                <div class="form-group">
                    <label for="mensaje">Mensaje o Propuesta *</label>
                    <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe aquí tu mensaje..." required></textarea>
                </div>
                <button type="submit" class="btn-ape" id="submit-btn">Enviar Comentarios</button>
            </form>
            <button onclick="window.location.href='index.html'" class="btn-ape" style="margin-top: 1rem; background-color: transparent; color: var(--ape-verde-main) !important; border: 1px solid var(--ape-verde-main); box-shadow: none;">Volver al Inicio</button>
        </section>
    </main>
</body>
</html>
